<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>画面比較</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  display:flex;gap:40px;justify-content:center;align-items:flex-start;
  padding:24px;background:#ffffff;min-height:100vh;
}
.panel{display:flex;flex-direction:column;align-items:center;gap:8px;}
label{color:#333;font-family:sans-serif;font-size:12px;letter-spacing:.08em;text-transform:uppercase;}
iframe{border:none;display:block;}
</style>
</head>
<body>
  <div class="panel">
    <label>タイトル画面</label>
    <iframe src="index.html" width="390" height="844" scrolling="no"></iframe>
  </div>
  <div class="panel">
    <label>テスト画面</label>
    <iframe src="test.html?preview" width="390" height="844" scrolling="no"></iframe>
  </div>
</body>
</html>
