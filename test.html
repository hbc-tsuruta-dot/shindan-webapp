<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>現場適性診断 - 回答</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dseg@0.46.0/css/dseg.min.css">
<link rel="stylesheet" href="css/glass.css">
<style>
.phone{background:#000;gap:6px!important;padding:10px 12px calc(10px + env(safe-area-inset-bottom))!important;}

/* トップバー */
.topbar{padding:8px 14px!important;border-radius:14px!important;}
.live-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:18px;font-weight:900;color:#ff2020;
  font-family:'Orbitron','Inter',sans-serif;letter-spacing:.1em;
  animation:liveBlink 2.2s step-end infinite;flex-shrink:0;
}
.live-dot{font-size:18px;line-height:1;}
@keyframes liveBlink{0%,58%{opacity:1;}60%,100%{opacity:0;}}
.who{font-size:11px!important;line-height:1.3!important;}

/* トップバー：LIVE + 時計 + タイマー 横一列 */
.topbar{
  flex-direction:row!important;
  align-items:center!important;
  justify-content:space-between!important;
  gap:8px!important;
  height:calc(3/30*100svh)!important;
  padding:4px 14px!important;
}
.clock-canvas{
  display:block;
  width:calc(2.5/30*100svh)!important;height:calc(2.5/30*100svh)!important;
  flex-shrink:0;
  margin-left:auto;
}
.timer-big{
  font-family:'DSEG7 Classic','Impact','Arial Black',sans-serif!important;
  font-size:clamp(48px,8svh,80px)!important;font-weight:900!important;
  color:#b8e0ff;
  white-space:nowrap;
  text-shadow:0 0 24px rgba(80,180,255,.8),0 0 48px rgba(40,120,255,.4);
  line-height:1;
  display:flex;align-items:center;
}
.td{display:inline-block;width:clamp(30px,5svh,50px);text-align:center;}
.ts{display:inline-block;width:clamp(14px,2svh,24px);text-align:center;}
.timer-big.warn  {color:#ffcc44;text-shadow:0 0 20px rgba(255,200,0,.8),0 0 40px rgba(255,140,0,.4);}
.timer-big.danger{color:#ff2040;text-shadow:0 0 20px rgba(255,0,40,.9),0 0 40px rgba(255,0,30,.5);}
.timer-big.blink{animation:timerPulse .45s ease-in-out infinite alternate;}
@keyframes timerPulse{from{opacity:1;}to{opacity:.3;}}

/* 進捗バー＋章タグ行 */
.prog-row{
  display:flex;align-items:center;gap:8px;flex-shrink:0;
  padding:0 4px;
}
.prog-row .chapter-tag{display:none!important;}
.prog-row .segbar{flex:1;display:flex;gap:1px;height:14px;background:rgba(255,255,255,.1);border-radius:8px;overflow:hidden;border:2px solid rgba(255,255,255,.2);}
.prog-row .seg{flex:1;height:100%!important;background:rgba(255,255,255,.08);transition:background .3s;}
.prog-row .seg.on{background:linear-gradient(180deg,#5cacff,#1a6edd);}
.prog-row .seg.latest{background:linear-gradient(180deg,#80d0ff,#40a0ff);box-shadow:0 0 6px rgba(80,180,255,.6);}

/* 設問カード：固定レイアウト（問題が変わっても高さ・位置が変わらない） */
.q-card{
  flex:1;min-height:0;overflow:hidden!important;
  border-radius:16px!important;padding:10px 14px!important;
  display:flex!important;flex-direction:column!important;
}
/* 問題カード：メタリックシルバー二重縁＋光沢 */
.q-card{
  flex:none!important;
  height:calc(7/30*100svh)!important;
  display:flex!important;flex-direction:column!important;
  background:linear-gradient(180deg, #6a7080 0%, #4a5060 30%, #3a4050 60%, #505868 100%)!important;
  border:none!important;
  border-radius:18px!important;
  box-shadow:
    0 0 0 4px #c8ccd4,
    0 0 0 6px #888e9a,
    0 0 0 8px #c8ccd4,
    inset 0 0 0 2px rgba(255,255,255,.8),
    0 8px 20px rgba(0,10,40,.3)!important;
  overflow:hidden!important;
}
.q-card::before{
  content:''!important;display:block!important;
  position:absolute;top:0;left:0;right:0;height:28%;
  border-radius:18px 18px 0 0;pointer-events:none;z-index:0;
  background:linear-gradient(180deg, rgba(255,255,255,.4) 0%, rgba(255,255,255,.08) 70%, transparent 100%)!important;
}
.q-card::after{
  content:''!important;display:block!important;
  position:absolute;bottom:0;left:0;right:0;height:30%;
  border-radius:0 0 18px 18px;pointer-events:none;z-index:0;
  background:linear-gradient(0deg, rgba(255,255,255,.25) 0%, rgba(255,255,255,.05) 60%, transparent 100%)!important;
}

/* 問題文エリア：固定高さ、文が長くてもABCD位置が変わらない */
.q-text-area{
  flex:1;height:auto;
  overflow-y:auto;
  scrollbar-width:none;-ms-overflow-style:none;
}
.q-text-area::-webkit-scrollbar{display:none;}
.q-card .qhead{display:flex!important;align-items:center!important;gap:8px!important;margin:0 0 4px 0!important;position:relative;z-index:1;}
.q-card .q-text-area{position:relative;z-index:1;height:100%;overflow:auto;}
.q-card .qbadge{
  display:inline-block!important;
  min-width:72px!important;height:32px!important;font-size:18px!important;padding:0 18px!important;
  background:linear-gradient(180deg,#222,#000)!important;color:#fff!important;
  border:1.5px solid #444!important;border-radius:4px!important;
  font-weight:900!important;box-shadow:0 1px 3px rgba(0,0,0,.2)!important;
  line-height:32px!important;flex-shrink:0!important;text-align:center!important;
}
.q-card .chapter-tag-inner{
  font-size:11px!important;color:rgba(255,255,255,.7)!important;font-weight:700!important;
  white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;
}
.read-btn{display:none!important;}
.q-card .qtext{font-size:18px!important;line-height:1.5!important;color:#fff!important;position:relative;z-index:1;text-shadow:0 1px 3px rgba(0,0,0,.4);}

/* 選択肢：カード外 */
.opts-outer{
  display:flex!important;flex-direction:column!important;
  gap:calc(0.3/30*100svh)!important;padding:0!important;overflow:visible!important;
}
.opts-outer .opt{
  flex:none!important;
  height:calc(2.6/30*100svh)!important;min-height:38px!important;
  background:linear-gradient(180deg, #fff 0%, #e8eaf0 100%)!important;
  border:none!important;
  border-radius:14px!important;
  box-shadow:
    0 0 0 3.5px #c8ccd4,
    0 0 0 5.5px #888e9a,
    0 0 0 7.5px #c8ccd4,
    inset 0 0 0 1.5px rgba(255,255,255,.8),
    0 3px 0 rgba(0,0,0,.12),
    0 5px 12px rgba(0,10,40,.12)!important;
  padding:0 12px!important;gap:10px!important;
  overflow:hidden!important;align-items:center!important;
  position:relative;
}
.opts-outer .opt::before{
  content:'';position:absolute;top:0;left:2%;right:2%;height:45%;
  border-radius:0 0 40% 40%;pointer-events:none;z-index:0;
  background:linear-gradient(180deg, rgba(255,255,255,.9) 0%, rgba(255,255,255,.15) 60%, transparent 100%);
}
.opts-outer .opt::after{
  content:'';position:absolute;bottom:0;left:5%;right:5%;height:30%;
  border-radius:40% 40% 0 0;pointer-events:none;z-index:0;
  background:linear-gradient(0deg, rgba(255,255,255,.5) 0%, rgba(255,255,255,.08) 60%, transparent 100%);
}
.opts-outer .opt .b-wrap{position:relative;flex-shrink:0;display:inline-block;}
.opts-outer .opt .b{
  width:38px!important;height:38px!important;flex-shrink:0!important;
  border-radius:50%!important;
  display:inline-flex!important;align-items:center!important;justify-content:center!important;
  font-size:20px!important;font-weight:900!important;color:#fff!important;
}
.opts-outer .opt[data-k="0"] .b{background:linear-gradient(135deg,#60b0ff,#1a6edd)!important;box-shadow:0 2px 6px rgba(30,100,220,.4)!important;}
.opts-outer .opt[data-k="1"]{margin-top:calc(0.45/30*100svh)!important;}
.opts-outer .opt[data-k="1"] .b{background:linear-gradient(135deg,#50e888,#15a050)!important;box-shadow:0 2px 6px rgba(20,160,80,.4)!important;}
.opts-outer .opt[data-k="2"]{margin-top:calc(0.45/30*100svh)!important;}
.opts-outer .opt[data-k="2"] .b{background:linear-gradient(135deg,#ffcc44,#dd8800)!important;box-shadow:0 2px 6px rgba(200,130,0,.4)!important;}
.opts-outer .opt[data-k="3"]{margin-top:calc(0.45/30*100svh)!important;}
.opts-outer .opt[data-k="3"] .b{background:linear-gradient(135deg,#ff7090,#dd2255)!important;box-shadow:0 2px 6px rgba(220,50,90,.4)!important;}
.opts-outer .opt .b-lbl{display:none!important;}
.opts-outer .opt .b-ico{font-size:20px!important;font-weight:900!important;line-height:1;color:#fff!important;}
.opts-outer .opt .t{font-size:15px!important;line-height:1.45!important;color:#111!important;position:relative;z-index:1;}

/* 選択状態 */
.opts-outer .opt.sel::before,.opts-outer .opt.sel::after{opacity:.4!important;}
.opts-outer .opt[data-k="0"].sel{background:linear-gradient(180deg,#4a9fff,#1560c0)!important;box-shadow:0 0 0 4px #1560c0,0 0 0 6.5px #0a3a80,0 0 0 8px #1560c0,inset 0 0 0 1.5px rgba(255,255,255,.3),0 4px 12px rgba(20,80,180,.4)!important;}
.opts-outer .opt[data-k="1"].sel{background:linear-gradient(180deg,#30e888,#10a050)!important;box-shadow:0 0 0 4px #10a050,0 0 0 6.5px #066030,0 0 0 8px #10a050,inset 0 0 0 1.5px rgba(255,255,255,.3),0 4px 12px rgba(16,160,80,.4)!important;}
.opts-outer .opt[data-k="2"].sel{background:linear-gradient(180deg,#ffcc55,#cc8800)!important;box-shadow:0 0 0 4px #cc8800,0 0 0 6.5px #885500,0 0 0 8px #cc8800,inset 0 0 0 1.5px rgba(255,255,255,.3),0 4px 12px rgba(200,130,0,.4)!important;}
.opts-outer .opt[data-k="3"].sel{background:linear-gradient(180deg,#ff6088,#cc2050)!important;box-shadow:0 0 0 4px #cc2050,0 0 0 6.5px #801030,0 0 0 8px #cc2050,inset 0 0 0 1.5px rgba(255,255,255,.3),0 4px 12px rgba(200,30,80,.4)!important;}
.opts-outer .opt.sel .t{color:#fff!important;}
.opts-outer .opt.sel .b-ico{color:#fff!important;}

/* ナビ */
.navbar{gap:6px!important;margin-top:0!important;padding:0!important;}
.btn3d{padding:10px 10px!important;font-size:19px!important;font-weight:900!important;border-radius:12px!important;
  transform:translateY(-3px)!important;
  border:3px solid!important;
  border-image:none!important;
}
.btn3d.blue.blink{
  outline:4px solid rgba(255,255,255,.9)!important;
  outline-offset:3px!important;
  animation:btn-outline-glow 1s ease-in-out infinite!important;
}
@keyframes btn-outline-glow{
  0%,100%{outline-color:rgba(255,255,255,0);outline-offset:3px;}
  50%{outline-color:rgba(255,255,255,.95);outline-offset:5px;}
}
.btn3d.blue,.btn3d.gold{
  background:linear-gradient(180deg,#5cacff 0%,#1a6edd 50%,#0f4ea0 100%)!important;
  color:#fff!important;
  border:4px solid #0a3570!important;border-radius:12px!important;
  box-shadow:0 4px 0 #082a55,0 0 0 1.5px #4090dd,0 6px 12px rgba(10,50,110,.5),inset 0 2px 0 rgba(255,255,255,.4)!important;
}
.btn3d.ghost{
  background:linear-gradient(180deg,#ff6666 0%,#cc2222 50%,#991111 100%)!important;
  color:#fff!important;
  border:4px solid #660a0a!important;border-radius:12px!important;
  box-shadow:0 4px 0 #440505,0 0 0 1.5px #cc4444,0 6px 12px rgba(100,10,10,.4),inset 0 2px 0 rgba(255,255,255,.3)!important;
  min-width:100px!important;padding:10px 20px!important;
}

/* Q番号ラベル */
.q-num-lbl{font-size:8px;color:var(--txt-mute);text-align:right;padding:0 4px;flex-shrink:0;margin-top:-4px;}

@media(max-width:539px){
  .phone{
    height:100svh!important;
    overflow:hidden!important;
    box-sizing:border-box!important;
    max-width:100%!important;
  }
  .topbar{ position:relative; top:calc(-0.3/30*100svh); }
  .prog-row{ position:relative; top:calc(-0.3/30*100svh); }
  .q-card{ position:relative; top:calc(0.5/30*100svh); }
  .opts-outer{ position:relative; top:calc(1/30*100svh); }
  .q-num-lbl{ display:none; }
  .navbar{ position:fixed; bottom:calc(0.5/30*100svh); left:calc(12px + 0.8/20*100vw); right:calc(12px + 0.8/20*100vw); z-index:100; }
}
</style>
</head>
<body>

<div class="phone">

  <div class="topbar">
    <span class="live-badge"><span class="live-dot">●</span>LIVE</span>
    <canvas id="clock-face" class="clock-canvas" width="120" height="120"></canvas>
    <div class="timer-big" id="timer"><span class="td" id="td0">4</span><span class="td" id="td1">0</span><span class="ts">.</span><span class="td" id="td2">0</span><span class="td" id="td3">0</span></div>
  </div>
  <span class="who" id="who" style="display:none"></span>

  <div class="prog-row">
    <span class="chapter-tag" id="chapter-tag">第1章</span>
    <div class="segbar" id="segbar"></div>
  </div>

  <div class="glass green pad q-card">
    <div class="q-text-area">
      <div class="qhead">
        <span class="qbadge" id="qbadge">Q1</span>
        <span class="chapter-tag-inner" id="chapter-tag-inner">第1章</span>
      </div>
      <div class="qtext" id="q-text">読み込み中...</div>
    </div>
  </div>

  <div class="opts opts-outer" id="options-area"></div>

  <div class="q-num-lbl" id="q-num-lbl">Q1 / 50</div>

  <div class="navbar">
    <button class="btn3d ghost" id="btn-prev" onclick="prevQuestion()" style="display:none">◀ 戻る</button>
    <button class="btn3d ghost" id="btn-abort" onclick="abortTest()">中断</button>
    <button class="btn3d blue"  id="btn-next" onclick="nextQuestion()" disabled>次へ ▶</button>
  </div>

</div>

<script src="data/questions_worker.js"></script>
<script src="data/questions_manager.js"></script>
<script src="js/scoring.js"></script>
<script src="js/sound.js"></script>
<script>
let currentQ = 0;
let answers  = {};
const QUESTION_TIME = 40;
let remaining = QUESTION_TIME;
let timerRaf = null, timerStartTime = 0, timerRunning = false;
let elapsedSec = 0;

const TEST_TYPE  = sessionStorage.getItem('test_type') || 'worker';
const QUESTIONS  = (TEST_TYPE === 'manager') ? QUESTIONS_MANAGER : QUESTIONS_WORKER;
const TYPE_LABEL = (TEST_TYPE === 'manager') ? '管理者・リーダー' : '作業者';

const _preview = new URLSearchParams(location.search).has('preview');
const UI_LANG = sessionStorage.getItem('ui_lang') || 'ja';
const examineeName  = sessionStorage.getItem('examinee_name')  || (_preview ? 'テスト 太郎' : null);
const examineeDept  = sessionStorage.getItem('examinee_dept')  || (_preview ? '製造ライン' : '');
const examineeMesid = sessionStorage.getItem('examinee_mesid') || '';
if (!examineeName) window.location.href = 'index.html';

document.getElementById('who').innerHTML = `<b>${examineeName}</b><br>${examineeDept}・${TYPE_LABEL}`;

const segbar = document.getElementById('segbar');
QUESTIONS.forEach(() => { const s = document.createElement('span'); s.className = 'seg'; segbar.appendChild(s); });
const segEls = segbar.querySelectorAll('.seg');

function stopTimer(){
  timerRunning = false;
  if(timerRaf){ cancelAnimationFrame(timerRaf); timerRaf=null; }
}

function startQuestionTimer(){
  stopTimer();
  remaining = QUESTION_TIME;
  timerStartTime = performance.now();
  timerRunning = true;
  tickTimer();
}

let _timerEl = null, _timerSpans = null;
function getTimerEls(){
  if(!_timerEl){ _timerEl = document.getElementById('timer'); }
  if(!_timerSpans){ _timerSpans = ['td0','td1','td2','td3'].map(id=>document.getElementById(id)); }
}

function tickTimer(){
  if(!timerRunning) return;
  remaining = Math.max(0, QUESTION_TIME - (performance.now() - timerStartTime) / 1000);
  getTimerEls();
  const sec = Math.floor(remaining);
  const cs  = Math.floor((remaining - sec) * 100);
  const digits = String(sec).padStart(2,'0') + String(cs).padStart(2,'0');
  _timerSpans.forEach((sp,i)=>{ if(sp.textContent !== digits[i]) sp.textContent = digits[i]; });
  const needDanger = remaining <= 10;
  const needWarn   = remaining <= 20 && !needDanger;
  if(needDanger !== _timerEl.classList.contains('danger')){
    _timerEl.classList.toggle('danger', needDanger);
    _timerEl.classList.toggle('blink',  needDanger);
  }
  if(needWarn !== _timerEl.classList.contains('warn')) _timerEl.classList.toggle('warn', needWarn);
  drawClock();
  if(remaining > 0) timerRaf = requestAnimationFrame(tickTimer);
  else { timerRunning = false; drawClock(); handleTimeout(); }
}

function handleTimeout(){
  answers[currentQ] = 'timeout';
  setTimeout(() => {
    if(currentQ >= QUESTIONS.length - 1){ submitTest(); }
    else { currentQ++; loadQuestion(currentQ); }
  }, 1200);
}

function loadQuestion(idx){
  const q = QUESTIONS[idx], total = QUESTIONS.length;
  document.getElementById('qbadge').textContent = 'Q' + (idx + 1);
  const chapterStr = q.chapter.replace(/（.*?）/g,'').trim();
  document.getElementById('chapter-tag').textContent = chapterStr;
  document.getElementById('chapter-tag-inner').textContent = chapterStr;
  document.getElementById('q-num-lbl').textContent = `Q${idx+1} / ${total}`;
  document.getElementById('q-text').textContent = (UI_LANG==='vi' && q.text_vi) ? q.text_vi : q.text;
  segEls.forEach((el,i) => { el.classList.toggle('on', i <= idx); el.classList.toggle('latest', i === idx); });

  const area = document.getElementById('options-area');
  area.innerHTML = '';
  const displayLabels = ['A','B','C','D'];
  const shuffled = [...q.options];
  for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}
  shuffled.forEach((opt, k) => {
    const btn = document.createElement('button');
    btn.className = 'opt' + (answers[idx] === opt.label ? ' sel' : '');
    btn.dataset.k = k;
    const optText = (UI_LANG==='vi' && opt.text_vi) ? opt.text_vi : opt.text;
    btn.innerHTML = `<span class="b-wrap"><span class="b"><span class="b-ico">${displayLabels[k]}</span></span></span><span class="t">${optText}</span>`;
    btn.onclick = () => selectOption(idx, opt.label, btn);
    area.appendChild(btn);
  });

  document.getElementById('btn-prev').style.display = 'none';
  const nextBtn = document.getElementById('btn-next');
  nextBtn.disabled = !answers[idx];
  if (idx === total - 1){
    nextBtn.textContent = '保存・終了 ▶';
    nextBtn.className = 'btn3d gold';
    nextBtn.onclick = submitTest;
  } else {
    nextBtn.textContent = '次へ ▶';
    nextBtn.className = 'btn3d blue';
    nextBtn.onclick = nextQuestion;
  }
  startQuestionTimer();
}

function selectOption(qIdx, label, clickedBtn){
  answers[qIdx] = label;
  Sound.select();
  document.querySelectorAll('#options-area .opt').forEach(b => b.classList.remove('sel'));
  clickedBtn.classList.add('sel');
  const nxBtn = document.getElementById('btn-next');
  nxBtn.disabled = false;
  nxBtn.classList.add('blink');
}

function pickFemaleVoice(){
  const voices = window.speechSynthesis.getVoices();
  const jaVoices = voices.filter(v => v.lang === 'ja-JP' || v.lang === 'ja');
  const priority = ['Google 日本語','Haruka','Ayumi','Kyoko','Google Japanese'];
  for(const name of priority){
    const v = jaVoices.find(v => v.name.includes(name));
    if(v) return v;
  }
  return jaVoices[0] || null;
}

function readAloud(){
  if (sessionStorage.getItem('audio_mode') === 'off') return;
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const q = QUESTIONS[currentQ];
  if (!q) return;
  const speak = () => {
    const utter = new SpeechSynthesisUtterance(q.text);
    utter.lang = 'ja-JP';
    utter.rate = 1.05;
    utter.pitch = 1.2;
    utter.volume = 1.0;
    const voice = pickFemaleVoice();
    if (voice) utter.voice = voice;
    const btn = document.getElementById('read-btn');
    if (btn) btn.classList.add('speaking');
    utter.onend  = () => { if (btn) btn.classList.remove('speaking'); };
    utter.onerror = () => { if (btn) btn.classList.remove('speaking'); };
    window.speechSynthesis.speak(utter);
  };
  const voices = window.speechSynthesis.getVoices();
  if (voices.length > 0){ speak(); }
  else { window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.onvoiceschanged = null; speak(); }; }
}

function nextQuestion(){
  if (!answers[currentQ]) return;
  document.getElementById('btn-next').classList.remove('blink');
  window.speechSynthesis && window.speechSynthesis.cancel();
  Sound.next();
  currentQ++;
  loadQuestion(currentQ);
  readAloud();
  window.scrollTo({top:0, behavior:'smooth'});
}

function prevQuestion(){
  if (currentQ > 0){ window.speechSynthesis && window.speechSynthesis.cancel(); Sound.back(); currentQ--; loadQuestion(currentQ); readAloud(); window.scrollTo({top:0}); }
}

function abortTest(){
  if (confirm('テストを中断しますか？\n回答を一時保存します。再開はMES IDを入力してください。')) {
    stopTimer();
    Sound.abort();
    const draft = {
      mesid: examineeMesid,
      name: examineeName,
      dept: examineeDept,
      type: TEST_TYPE,
      currentQ: currentQ,
      answers: answers,
      savedAt: new Date().toISOString()
    };
    localStorage.setItem('shindan_draft_' + examineeMesid, JSON.stringify(draft));
    sessionStorage.removeItem('_loaded');
    setTimeout(() => { window.location.href = 'index.html'; }, 350);
  }
}

function submitTest(){
  if (Object.keys(answers).length < QUESTIONS.length){ alert('すべての問題に回答してください。'); return; }
  stopTimer();
  Sound.submit();
  const result = calculateScores(answers, QUESTIONS, TEST_TYPE);
  result.name     = examineeName;
  result.dept     = examineeDept;
  result.mesid    = examineeMesid;
  result.date     = new Date().toISOString().split('T')[0];
  result.duration = elapsedSec;
  result.id       = 'R' + Date.now();
  const all = JSON.parse(localStorage.getItem('shindan_results') || '[]');
  all.push(result);
  localStorage.setItem('shindan_results', JSON.stringify(all));
  localStorage.removeItem('shindan_draft_' + examineeMesid);
  sessionStorage.removeItem('_loaded');
  setTimeout(() => { window.location.href = 'complete.html'; }, 420);
}

function drawClock(){
  const cv = document.getElementById('clock-face');
  if(!cv) return;
  const ctx = cv.getContext('2d');
  const w=cv.width, h=cv.height, cx=w/2, cy=h/2;
  const outerR=cx-2, trackR=cx-11;
  const progress = 1 - Math.max(0, remaining) / QUESTION_TIME;
  const isDanger = remaining <= 10;
  const isWarn   = remaining <= 20;

  ctx.clearRect(0,0,w,h);

  // 背景：ダークラジアルグラデーション
  const bgGrad = ctx.createRadialGradient(cx-8, cy-10, 2, cx, cy, outerR);
  bgGrad.addColorStop(0, 'rgba(28,48,110,.98)');
  bgGrad.addColorStop(0.65, 'rgba(8,16,50,.98)');
  bgGrad.addColorStop(1, 'rgba(3,6,24,1)');
  ctx.beginPath(); ctx.arc(cx,cy,outerR,0,Math.PI*2);
  ctx.fillStyle=bgGrad; ctx.fill();

  // メタリック外枠（グラデーションリング）
  const mg = ctx.createLinearGradient(0, 0, w, h);
  mg.addColorStop(0,   'rgba(210,230,255,.95)');
  mg.addColorStop(0.2, 'rgba(150,185,255,.70)');
  mg.addColorStop(0.5, 'rgba(70,100,200,.55)');
  mg.addColorStop(0.8, 'rgba(160,195,255,.80)');
  mg.addColorStop(1,   'rgba(205,225,255,.92)');
  ctx.beginPath(); ctx.arc(cx,cy,outerR,0,Math.PI*2);
  ctx.strokeStyle=mg; ctx.lineWidth=4.5; ctx.stroke();

  // 内側ハイライトリング（エッジ光）
  ctx.beginPath(); ctx.arc(cx,cy,outerR-5,0,Math.PI*2);
  ctx.strokeStyle='rgba(120,170,255,.15)'; ctx.lineWidth=1; ctx.stroke();

  // トラックリング（灰色ベース）
  ctx.beginPath(); ctx.arc(cx,cy,trackR,-Math.PI/2,Math.PI*3/2);
  ctx.strokeStyle='rgba(18,35,95,.75)'; ctx.lineWidth=14; ctx.lineCap='round'; ctx.stroke();

  // 40秒の刻み線
  for(let i=0;i<40;i++){
    const ang = -Math.PI/2 + (i/40)*Math.PI*2;
    const isMaj = i%5===0;
    const r0 = trackR - (isMaj?7:4);
    const r1 = trackR + (isMaj?5:3);
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(ang)*r0, cy+Math.sin(ang)*r0);
    ctx.lineTo(cx+Math.cos(ang)*r1, cy+Math.sin(ang)*r1);
    ctx.strokeStyle = isMaj ? 'rgba(160,200,255,.70)' : 'rgba(100,140,220,.40)';
    ctx.lineWidth = isMaj ? 2.5 : 1.5;
    ctx.lineCap='butt'; ctx.globalAlpha=1; ctx.stroke();
  }

  // 進捗アーク（グロー：多重描画）
  if(progress > 0.001){
    const arcCol = isDanger ? '#ff2040' : isWarn ? '#ff9010' : '#4aa8ff';
    const endAngle = -Math.PI/2 + progress*Math.PI*2;
    ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(cx,cy,trackR,-Math.PI/2,endAngle);
    ctx.strokeStyle=arcCol; ctx.lineWidth=30; ctx.globalAlpha=0.10; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,trackR,-Math.PI/2,endAngle);
    ctx.lineWidth=20; ctx.globalAlpha=0.20; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,trackR,-Math.PI/2,endAngle);
    ctx.lineWidth=14; ctx.globalAlpha=1; ctx.stroke();
  }

  // 中心ドット（グロー）
  const dotCol = isDanger ? '#ff2040' : isWarn ? '#ff9010' : 'rgba(80,150,255,.95)';
  ctx.beginPath(); ctx.arc(cx,cy,9,0,Math.PI*2);
  ctx.fillStyle=dotCol; ctx.globalAlpha=0.25; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2);
  ctx.fillStyle=dotCol; ctx.globalAlpha=1; ctx.fill();
}

window.addEventListener('load', () => {
  if (typeof QUESTIONS === 'undefined') return;
  setInterval(()=>{ elapsedSec++; }, 1000);
  let rawDraft = sessionStorage.getItem('resume_draft');
  if (!rawDraft && examineeMesid) {
    rawDraft = localStorage.getItem('shindan_draft_' + examineeMesid);
  }
  if (rawDraft) {
    try {
      const draft = JSON.parse(rawDraft);
      answers  = draft.answers  || {};
      currentQ = draft.currentQ || 0;
      sessionStorage.removeItem('resume_draft');
      Object.keys(answers).forEach(i => {
        const el = segEls[i]; if(el) el.classList.add('answered');
      });
    } catch(e) { currentQ = 0; }
  }
  loadQuestion(currentQ);
});

function toggleBGM(){
  if(Sound.bgmIsOn()){ Sound.bgmStop(); }
  else { Sound.bgmStart(); }
  var btn = document.getElementById('bgm-btn');
  if(btn){
    if(Sound.bgmIsOn()){ btn.classList.add('active'); btn.title = Sound.bgmLabel() || 'BGM'; }
    else { btn.classList.remove('active'); btn.title = 'BGM OFF'; }
  }
}
