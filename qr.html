<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>QR Code</title>
<style>
  body { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0; background:#111; color:#fff; font-family:sans-serif; }
  canvas { margin:20px; }
  p { font-size:18px; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
<p>スマホでスキャンしてください</p>
<div id="qr"></div>
<p id="url"></p>
<script>
  const url = "http://192.168.11.5:8080";
  document.getElementById("url").textContent = url;
  new QRCode(document.getElementById("qr"), { text: url, width: 256, height: 256 });
</script>
</body>
</html>
